v class="line">73</div><div class="line">74</div><div class="line">75</div><div class="line">76</div><div class="line">77</div><div class="line">78</div><div class="line">79</div><div class="line">80</div><div class="line">81</div><div class="line">82</div><div class="line">83</div><div class="line">84</div><div class="line">85</div><div class="line">86</div><div class="line">87</div><div class="line">88</div><div class="line">89</div><div class="line">90</div><div class="line">91</div><div class="line">92</div><div class="line">93</div><div class="line">94</div><div class="line">95</div><div class="line">96</div><div class="line">97</div><div class="line">98</div><div class="line">99</div><div class="line">100</div><div class="line">101</div><div class="line">102</div><div class="line">103</div><div class="line">104</div><div class="line">105</div><div class="line">106</div><div class="line">107</div><div class="line">108</div><div class="line">109</div><div class="line">110</div><div class="line">111</div><div class="line">112</div><div class="line">113</div><div class="line">114</div><div class="line">115</div><div class="line">116</div><div class="line">117</div><div class="line">118</div><div class="line">119</div><div class="line">120</div><div class="line">121</div><div class="line">122</div><div class="line">123</div><div class="line">124</div><div class="line">125</div><div class="line">126</div><div class="line">127</div><div class="line">128</div><div class="line">129</div><div class="line">130</div><div class="line">131</div><div class="line">132</div><div class="line">133</div><div class="line">134</div><div class="line">135</div></pre></td><td class="code"><pre><div class="line"><span class="comment">/************ 框架部分 ************/</span></div><div class="line"><span class="keyword">var</span> ui = &#123;</div><div class="line">    version:<span class="string">'0.0.1'</span>,</div><div class="line">    isArray: $.isArray,</div><div class="line">    is        <span class="keyword">return</span> ui.extend(a, o);</div><div class="line">            &#125;;</div><div class="line">            <span class="keyword">return</span> a;</div><div class="line">        &#125;;</div><div class="line">    &#125;(),</div><div class="line">    draw: <span class="function"><span class="keyword">function</span>(<span class="params">confObj</span>) </span>&#123;</div><div class="line">        <span class="keyword">var</span> rtn = [];</div><div class="line">        <span class="keyword">if</span>(!ui.isArray(confObj))confObj = [confObj];</div><div class="line">        <span class="keyword">for</span> (<span class="keyword">var</span> i = <span class="number">0</span>; i &lt; confObj.length; i++) &#123;</div><div class="line">            <span class="keyword">var</span> cls = confObj[i].renderer;</div><div class="line">            <span class="keyword">if</span> (!cls) &#123;</div><div class="line">                <span class="keyword">throw</span> <span class="keyword">new</span> <span class="built_in">Error</span>(<span class="string">'Could not find property renderer!'</span>);</div><div class="line">                <span class="keyword">return</span> <span class="literal">false</span>;</div><div class="line">            &#125;</div><div class="line">            <span class="keyword">else</span> &#123;</div><div class="line">                <span class="comment">/**</span></div><div class="line"><span class="comment">                 * 1、先执行ui.comp[cls](confObj[i])</span></div><div class="line"><span class="comment">                 * 2、再执行draw方法</span></div><div class="line"><span class="comment">                 */</span></div><div class="line">                rtn[rtn.length] = <span class="keyword">new</span> ui.comp[cls](confObj[i]).draw();</div><div class="line">            &#125;</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> (rtn.length == <span class="number">1</span>)?rtn[<span class="number">0</span>]:rtn;</div><div class="line">    &#125;,</div><div class="line">    override: <span class="function"><span class="keyword">function</span>(<span class="params">a, b</span>) </span>&#123;</div><div class="line">        <span class="keyword">if</span> (b) &#123;</div><div class="line">            <span class="keyword">var</span> p = a.prototype;</div><div class="line">            <span class="keyword">for</span> (<span class="keyword">var</span> prop <span class="keyword">in</span> b) p[prop] = b[prop];</div><div class="line">        &#125;</div><div class="line">    &#125;</div><div class="line">&#125;;</div><div class="line"></div><div class="line">ui.comp = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">    <span class="keyword">this</span>.description = <span class="string">'UI Base Class'</span>;</div><div class="line">    <span class="comment">/**</span></div><div class="line"><span class="comment">     * _f的作用</span></div><div class="line"><span class="comment">     * 1、JS顺次执行，执行_f时，this下是没draw方法</span></div><div class="line"><span class="comment">     * 2、向this的原型链上查找draw方法</span></div><div class="line"><span class="comment">     * 3、因为ui.comp.Block.superclass.constructor.apply(this, arguments);</span></div><div class="line"><span class="comment">     *       的关系，此时this原型链的draw方法就是组件定义的draw方法</span></div><div class="line"><span class="comment">     * 4、将组件的draw方法保存在_f变量上</span></div><div class="line"><span class="comment">     */</span></div><div class="line">    </div><div class="line">    <span class="keyword">var</span> _f = <span class="keyword">this</span>.draw;</div><div class="line">    <span class="keyword">this</span>.draw = <span class="function"><span class="keyword">function</span>(<span class="params"></span>) </span>&#123;</div><div class="line">        <span class="built_in">console</span>.log(<span class="string">'comp里的draw方法'</span>);</div><div class="line">        <span class="comment">/**</span></div><div class="line"><span class="comment">         * 1、先执行ui.comp的draw方法</span></div><div class="line"><span class="comment">         * 2、因为_f保存了组件的draw方法，所以可以执行组件里的方法</span></div><div class="line"><span class="comment">         */</span></div><div class="line">        <span class="keyword">try</span> &#123;</div><div class="line">            <span class="keyword">var</span> rtn = _f.call(<span class="keyword">this</span>);</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">catch</span>(ex)&#123;</div><div class="line">            <span class="keyword">throw</span> <span class="keyword">new</span> <span class="built_in">Error</span>(<span class="string">'ui.comp.'</span>+<span class="keyword">this</span>.description +ex);</div><div class="line">        &#125;</div><div class="line">        <span class="keyword">return</span> rtn;</div><div class="line">    &#125;</div><div class="line">    <span class="keyword">return</span> <span class="keyword">this</span>;</div><div class="line">&#125;;</div><div class="line"></div><div class="line"></div><div class="line"><span class="comment">/************ 组件部分 ************/</span></div><div class="line">ui.version.Block = <span class="string">'1.0'</span>;</div><div class="line">ui.comp.Block = ui.extend(<span class="string">''</span>, &#123;</div><div class="line">    <span class="keyword">constructor</span>: function(param)&#123;</div><div class="line">        <span class="comment">/**</span></div><div class="line"><span class="comment">         * 关键步骤：改变了运行时ui.comp的this指向，这样ui.comp的原型链上，</span></div><div class="line"><span class="comment">         *                  才有组件的方法，包括draw方法</span></div><div class="line"><span class="comment">         */</span></div><div class="line">        ui.comp.Block.superclass.constructor.apply(<span class="keyword">this</span>, <span class="built_in">arguments</span>);</div><div class="line">        </div><div class="line">        <span class="keyword">for</span>(<span class="keyword">var</span> p <span class="keyword">in</span> param)<span class="keyword">this</span>[p] = param[p];</div><div class="line">        <span class="keyword">this</span>.description=<span class="string">'Block'</span>;</div><div class="line">    &#125;,</div><div class="line">    draw:<span class="function"><span class="keyword">function</span>(<span class="params"></span>)</span>&#123;</div><div class="line">        <span class="built_in">console</span>.log(<span class="string">"开始绘制"</span>);</div><div class="line">        </div><div class="line">        <span class="keyword">return</span> <span class="keyword">this</span>;</div><div class="line">    &#125;</div><div class="line">&#125;);</div><div class="line"><span class="comment">/************ 实例部分 ************/</span></div><div class="line"><span class="keyword">var</span> p_block = ui.draw(&#123;</div><div class="line">    renderer: <span class="string">'Block'</span>,</div><div class="line">    margin: <span class="literal">true</span>,</div><div class="line">    inline: <span class="literal">true</span>,</div><div class="line">    width: <span class="number">5</span></div><div class="line">&#125;);</div></pre></td></tr></table></figure></p>
